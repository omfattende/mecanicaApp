version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: tallerpro-db
    environment:
      POSTGRES_DB: mecanica
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mecanica"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tallerpro-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tallerpro-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:admin@postgres:5432/mecanica?schema=public
      JWT_SECRET: ${JWT_SECRET:-tallerpro_secret_key_change_in_production}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - backend_logs:/app/logs
    networks:
      - tallerpro-network

  # Frontend Angular
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tallerpro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tallerpro-network

volumes:
  postgres_data:
  backend_logs:

networks:
  tallerpro-network:
    driver: bridge
