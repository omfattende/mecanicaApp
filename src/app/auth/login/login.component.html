<div class="login-wrapper">

  <!-- ── Panel izquierdo: imagen decorativa ─────────── -->
  <div class="login-image-panel">
    <div class="image-overlay">
      <div class="brand-badge">
        <img src="imagenes/laimagen.jpg" alt="TallerPro">
      </div>
      <div class="image-text">
        <h2>TallerPro</h2>
        <p>Sistema de Gestión Mecánica Profesional</p>
        <div class="features">
          <div class="feature-item">
            <i class="fas fa-wrench"></i>
            <span>Gestión de órdenes de trabajo</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-calendar-check"></i>
            <span>Agenda de citas inteligente</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-car"></i>
            <span>Control de vehículos</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Panel derecho: formulario de login ────────────── -->
  <div class="login-form-panel">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo">
          <i class="fas fa-cog"></i>
        </div>
        <h1>Bienvenido</h1>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <form (ngSubmit)="onLogin()" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Ingresa tu usuario"
              required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" [(ngModel)]="password" name="password"
              placeholder="Ingresa tu contraseña" required>
          </div>
        </div>

        <div class="success-message" *ngIf="successMessage">
          <i class="fas fa-check-circle"></i>
          {{ successMessage }}
        </div>

        <div class="error-message" *ngIf="errorMessage">
          <i class="fas fa-exclamation-triangle"></i>
          {{ errorMessage }}
        </div>

        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i>
          Iniciar Sesión
        </button>

        <div class="divider">
          <span>o</span>
        </div>

        <button type="button" class="register-btn" (click)="openRegisterModal()">
          <i class="fas fa-user-plus"></i>
          Crear Cuenta de Cliente
        </button>

        <div class="demo-info">
          <small>Demo: usuario: <strong>admin</strong> | contraseña: <strong>admin</strong></small>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal de Registro -->
<app-register *ngIf="showRegisterModal" (closeModal)="closeRegisterModal()"
  (registrationSuccess)="onRegistrationSuccess($event)">
</app-register>
