# Override para desarrollo
version: '3.8'

services:
  backend:
    build:
      target: builder
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: npm run dev

  postgres:
    ports:
      - "5432:5432"
